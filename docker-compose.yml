version: '3.8'

services:
  backend:
    build: ./backend
    expose:
      - "3001"
    volumes:
      - ./.env:/app/.env
      - ./subscriptions.json:/app/subscriptions.json
    environment:
      - PORT=3001
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - VAPID_CONTACT=${VAPID_CONTACT:-mailto:vapid@example.com}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
